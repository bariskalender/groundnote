name: Feature request
description: Suggest a focused, local-first GroundNote improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should GroundNote solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful change and expected workflow.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Local privacy and resource impact
      description: Explain network, storage, model, memory, CPU, and data-retention implications.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This request does not require uploading private documents or secrets.
          required: true
        - label: I understand proposed features are not current GroundNote capabilities.
          required: true
